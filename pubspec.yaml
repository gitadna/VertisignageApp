name: vertisignage
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  dio: ^5.7.0
  web_socket_channel: ^3.0.0
  get_it: ^8.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  path: ^1.9.1
  crypto: ^3.0.6
  package_info_plus: ^10.1.0
  video_player: ^2.9.2
  webview_flutter: ^4.10.0
  connectivity_plus: ^6.1.1
  permission_handler: ^12.0.1
  android_intent_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  default-flavor: kiosk
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/verti_signage_logo.png"

  android_flavors:
    kiosk:
      image_path: "assets/verti_signage_logo.png"